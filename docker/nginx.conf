# Конфиг nginx для статической раздачи Blazor WebAssembly.
# try_files: корректные deep-link маршруты Blazor (SPA) без 404 на F5.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xml+rss text/javascript application/wasm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш для иммутабельных ассетов _framework (имена с хешами после publish).
    location /_framework/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_content/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
