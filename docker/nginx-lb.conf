# Nginx выступает как локальный L7 балансировщик для SignalR.
# consistent hash по IP даёт session affinity без внешних sticky-модулей.

resolver 127.0.0.11 valid=10s ipv6=off;

upstream signalr_backend {
    zone signalr_backend 64k;
    hash $remote_addr consistent;
    server app:8080 resolve;
}

server {
    listen 8080;
    server_name localhost;

    location / {
        proxy_pass http://signalr_backend;
        proxy_http_version 1.1;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 5s;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
