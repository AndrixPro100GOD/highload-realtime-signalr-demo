# Локальный стек: статический Blazor UI + Redis для будущего SignalR backplane.
# Запуск: docker compose up --build

services:
  blazor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
